<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agor | Kodilon Drinks Details</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Reuse Header Style */
        header {
            background: #4A0404;
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* --- 🏛️ PRODUCT DISPLAY LAYOUT --- */
        .product-container {
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            display: flex; /* Creates the two columns */
            gap: 40px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Left Side: Large Image */
        .product-image-large {
            flex: 1;
            text-align: center;
        }

        .product-image-large img {
            max-width: 100%;
            height: 450px; /* Big and bold */
            object-fit: contain;
        }

        /* Right Side: Details */
        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .category-tag {
            color: rgb(73, 34, 36);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .price-large {
            font-size: 2.5rem;
            color: #4A0404;
            font-weight: bold;
            margin: 20px 0;
        }

        .description {
            line-height: 1.6;
            color: #302828;
            margin-bottom: 30px;
        }

        /* Reuse Your Button */
        .buy-btn {
            background: linear-gradient(45deg, #5a242a );
            color: #f0eaea;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 768px) {
            .product-container {
                flex-direction: column;
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Back to Shop</a>
        <div style="font-size: 1.2rem; font-weight: bold;">KODILON 🍷</div>
        <div>🛒 (1)</div>
    </header>

    <main class="product-container">
        
        <div class="product-image-large">
            <img src="Agor.jpg" alt="Agor Wine">
        </div>

        <div class="product-details">
            <div class="category-tag"> Wine</div>
            <h1>Agor</h1>
            <p>⭐⭐⭐⭐⭐ (230 Reviews)</p>
            
            <div class="price-large">₦8,500</div>

            <p class="description">
                Rich red berry notes with soft tannins and a smooth finish. Elegant, balanced, and perfect for refined occasions.
            </p>

            <div style="margin-bottom: 20px;">
                <label>Select Quantity:</label>
                <select style="padding: 8px; border-radius: 5px; width: 80px;">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>12 (Full Case)</option>
                </select>
            </div>

            <button class="buy-btn">Add to Cart</button>
        </div>

    </main>

</body>
</html>
