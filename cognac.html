<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodilon | Cognac Collection</title>
    <style>
        /* --- 🎨 COLORS & STYLING --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffafa; /* Very light wine tint */
            margin: 0;
            color: #333;
        }

        header {
            background: #4A0404; /* Deep Burgundy */
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .search-bar {
            width: 40%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #BF953F;
        }

        .section-title {
            padding: 30px 5% 10px;
            color: #4A0404;
            font-size: 2rem;
        }

        /* --- 📦 THE GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 5%;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #BF953F;
        }

        .card img {
            height: 250px;
            width: 100%;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4A0404;
            margin: 10px 0;
        }

        /* --- BUTTONS --- */
        .add-btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #4A0404;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-premium {
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #AA771C);
            color: #4A0404;
        }
    </style> </head>
<body>

    <header>
        <div style="font-size: 1.6rem; font-weight: 900;">
            <a href="index.html" style="color: white; text-decoration: none;">KODILON</a>
        </div>
        <input type="text" class="search-bar" placeholder="Search Cognac...">
        <div style="cursor: pointer;">🛒 <span>0</span></div>
    </header>

    <p style="padding: 20px 5% 0; color: #666; font-size: 0.9rem;">
        <a href="index.html" style="color: #4A0404; text-decoration: none; font-weight: bold;">Home</a> / Cognac
    </p>

    <h2 class="section-title">Our Cognac Collection</h2>

    <div class="product-grid">
        
        <div class="card">
            <img src="Hennessy.jpg" alt="Hennessy">
            <h3>Hennessy VSOP</h3>
            <div class="price">₦95,000</div>
            <label>Qty:</label>
            <select style="width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 5px;">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>12 (Full Case)</option>
            </select>
            <button class="add-btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="Martell.jpg" alt="Martell">
            <h3>Martell Blue Swift</h3>
            <div class="price">₦110,000</div>
            <label>Qty:</label>
            <select style="width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 5px;">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>12 (Full Case)</option>
            </select>
            <button class="add-btn btn-premium">Add to Cart</button>
        </div>

        <div class="card">
            <img src="Remy.jpg" alt="Remy">
            <h3>Remy Martin XO</h3>
            <div class="price">₦280,000</div>
            <label>Qty:</label>
            <select style="width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 5px;">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>12 (Full Case)</option>
            </select>
            <button class="add-btn btn-premium">Add to Cart</button>
        </div>

    </div>

</body>
</html>
